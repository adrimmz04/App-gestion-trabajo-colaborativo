app.auth.include-code-in-response=false
app.auth.mail.enabled=true
app.auth.mail.from=${APP_MAIL_FROM:${APP_MAIL_USERNAME:no-reply@app-gestion.local}}
app.auth.mail.sender-name=${APP_MAIL_SENDER_NAME:APP-GESTION}

spring.mail.host=smtp-mail.outlook.com
spring.mail.port=587
spring.mail.username=${APP_MAIL_USERNAME:}
spring.mail.password=${APP_MAIL_PASSWORD:}
spring.mail.test-connection=true
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.localhost=${APP_MAIL_SMTP_LOCALHOST:localhost}
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
