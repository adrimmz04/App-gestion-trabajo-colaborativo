server.port=0
spring.application.name=app-gestion-trabajo-colaborativo-flyway-test

spring.datasource.url=jdbc:h2:mem:flywaytestdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.cache.type=none
spring.task.scheduling.enabled=false

logging.level.root=WARN
logging.level.pds.app_gestion=INFO