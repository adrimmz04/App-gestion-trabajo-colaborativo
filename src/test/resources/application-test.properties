server.port=8080
spring.application.name=app-gestion-trabajo-colaborativo-test

# Configuración de JPA/Hibernate para tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Base de datos H2 en memoria
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Deshabilitar Hibernate Envers para tests
spring.jpa.properties.org.hibernate.envers.enabled=false

# H2 Console (opcional, para debugging)
spring.h2.console.enabled=true

# Configuración de Flyway
spring.flyway.enabled=false
# spring.flyway.locations=classpath:db/migration
# spring.flyway.baseline-on-migrate=true

# Logging
logging.level.root=WARN
logging.level.pds.app_gestion=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.boot.web.servlet.context=DEBUG

# Deshabilitar caché en tests
spring.cache.type=none
compactacion.dias-archivo=7
compactacion.dias-eliminacion=30

# Habilitar schedulers
spring.task.scheduling.enabled=true

# Caché
spring.cache.type=caffeine
